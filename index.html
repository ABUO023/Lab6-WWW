<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionnaire de Tâches - CSI 3540</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-white min-h-screen py-8 px-4">
    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-semibold text-gray-900 mb-1">Gestionnaire de Tâches</h1>
            <p class="text-gray-500 text-sm">CSI 3540 - Laboratoire 6</p>
        </div>

        <!-- Main Content -->
        <div class="space-y-6">
            
            <!-- Controls -->
            <div class="flex items-center justify-between gap-4 pb-4 border-b border-gray-200">
                <!-- Font Size -->
                <div class="flex items-center gap-2">
                    <label class="text-sm text-gray-600 font-medium">Taille:</label>
                    <div class="flex items-center gap-1 border border-gray-300 rounded px-2 py-1">
                        <button id="decreaseFont" class="p-1 hover:bg-gray-100 rounded">
                            <i data-lucide="minus" class="w-4 h-4 text-gray-600"></i>
                        </button>
                        <span id="fontSizeDisplay" class="w-10 text-center text-sm font-medium text-gray-700">100%</span>
                        <button id="increaseFont" class="p-1 hover:bg-gray-100 rounded">
                            <i data-lucide="plus" class="w-4 h-4 text-gray-600"></i>
                        </button>
                    </div>
                </div>

                <!-- Print -->
                <button id="printButton" class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-700 border border-gray-300 rounded hover:bg-gray-50">
                    <i data-lucide="printer" class="w-4 h-4 text-gray-600"></i>
                    Imprimer
                </button>
            </div>

            <!-- Input Section -->
            <div class="flex gap-2">
                <input 
                    type="text" 
                    id="taskInput" 
                    class="flex-1 px-4 py-2 border border-gray-300 rounded text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-gray-400 focus:border-transparent"
                    placeholder="Entrez une nouvelle tâche..."
                    autocomplete="off"
                >
                <button id="addButton" class="px-6 py-2 font-medium text-white bg-gray-900 rounded hover:bg-gray-800">
                    Ajouter
                </button>
            </div>

            <!-- Action Selector -->
            <div class="flex items-center gap-3 p-3 bg-gray-50 rounded border border-gray-200">
                <label class="text-sm font-medium text-gray-700 whitespace-nowrap">Action:</label>
                <select id="actionMode" class="flex-1 px-3 py-2 border border-gray-300 rounded text-gray-900 focus:outline-none focus:ring-1 focus:ring-gray-400 focus:border-transparent">
                    <option value="none">-- Sélectionnez une action --</option>
                    <option value="delete">Supprimer</option>
                    <option value="up">Monter</option>
                    <option value="down">Descendre</option>
                </select>
            </div>

            <!-- Task List -->
            <div class="border border-gray-200 rounded">
                <ol id="taskList" class="divide-y divide-gray-200 list-decimal list-inside">
                    <li class="empty-message py-8 text-center text-gray-400 text-sm">
                        Aucune tâche pour le moment
                    </li>
                </ol>
            </div>

            <!-- Footer -->
            <div class="flex items-center justify-between text-sm text-gray-600 pt-4 border-t border-gray-200">
                <span id="taskCount">Aucune tâche</span>
                <span class="text-xs text-gray-400">Cliquez sur une tâche après sélectionner une action</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
